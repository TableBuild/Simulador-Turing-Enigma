<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador Máquina de Turing + Enigma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

<!-- Librería para leer PDFs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Configuración del worker de PDF.js -->
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <!-- Librería para generar PDFs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<h1>🧠 Simulador Máquina de Turing + Enigma</h1>

<div class="panel">

  <!-- Entrada de texto -->
  <input id="input" placeholder="Texto o PDF importado" />

  <!-- Selector de estado inicial -->
<label for="key">Estado inicial de la máquina:</label>
<select id="key" title="Estado inicial de la máquina de Turing">
    <option value="1">Estado inicial q1</option>
    <option value="2">Estado inicial q2</option>
    <option value="3">Estado inicial q3</option>
  </select>

  <br>

  <!-- Importar PDF -->
<label for="pdfInput">Importar archivo PDF:</label>
  <input
    id="pdfInput"
    type="file"
    accept="application/pdf"
    title="Seleccionar archivo PDF para encriptar"
    onchange="loadPDF(event)"
  >

  <br>

  <!-- Controles -->
  <button onclick="start()">Iniciar</button>
  <button onclick="step()">Paso</button>
  <button onclick="toggleAuto()">Auto / Pausa</button>
  <button onclick="resetMachine()">Reset</button>

  <br>

  <!-- Exportar resultado -->
  <button onclick="exportEncryptedPDF()">Exportar resultado (PDF)</button>
</div>

<h3>
  Estado actual: <span id="state">-</span> |
  Rotor shift: <span id="shift">-</span>
</h3>

<div id="tape-container">
  <div id="tape"></div>
</div>

<h3>📘 Bitácora de ejecución</h3>
<pre id="explanation"></pre>

<h3>🔐 Resultado final</h3>
<div id="result-box">—</div>

<script src="script.js"></script>
</body>
</html>
